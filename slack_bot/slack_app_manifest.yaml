# ZeroBase Deck Bot — Slack App Manifest
#
# 사용법:
#   1) https://api.slack.com/apps → "Create New App" → "From a manifest"
#   2) 워크스페이스 선택 → 이 YAML 전체를 붙여넣기 → Next → Create
#   3) 생성 후 OAuth & Permissions → Install to Workspace
#   4) Slack 앱 페이지의 토큰들을 Cloud Run secret에 등록 (아래 환경 변수 참고)
#      - Bot User OAuth Token (xoxb-...)        → SLACK_BOT_TOKEN
#      - Signing Secret                          → SLACK_SIGNING_SECRET
#      - App-Level Token (Socket Mode 쓸 때만)   → SLACK_APP_TOKEN
#   5) Event Subscriptions와 Slash Command의 Request URL은 Cloud Run 배포 후
#      최종 URL로 교체 (https://YOUR-CLOUD-RUN-URL/slack/events 형태)

display_information:
  name: ZeroDeck
  description: 제로베이스 PPT 자동 생성 봇 - 자연어, 폼, JSON 모두 지원
  background_color: "#1C2885"
  long_description: |
    ZeroDeck은 제로베이스 디자인 시스템 기반으로 발표 자료를 자동 생성합니다.

    사용 방법:
    1) /제로덱 [주제 + 대상]  -- 자연어로 한 줄 입력
    2) @ZeroDeck 멘션으로 대화형 진행
    3) /제로덱-폼 으로 모달 폼 입력
    4) JSON 파일을 채널에 업로드 + 봇 멘션

    출력: HTML 미리보기 링크 + PPTX 파일 + PDF 파일

features:
  bot_user:
    display_name: ZeroDeck
    always_online: true

  slash_commands:
    - command: /제로덱
      description: 자연어로 PPT 생성 요청 (예 - 자기소개서 작성법, 신입 대상, 8장)
      usage_hint: "[주제] + [대상] + [슬라이드 수]"
      should_escape: false

    - command: /제로덱-폼
      description: 모달 폼으로 정밀 입력
      should_escape: false

    - command: /제로덱-도움말
      description: 사용법 안내
      should_escape: false

oauth_config:
  scopes:
    bot:
      # 메시지 수신·발신
      - app_mentions:read         # @ZeroDeck 멘션 받기
      - chat:write                # 메시지 보내기
      - chat:write.public         # 멤버 아닌 채널에도 게시
      - commands                  # 슬래시 커맨드
      # 파일 처리
      - files:read                # 업로드된 JSON 파일 읽기
      - files:write               # 생성된 PPTX/PDF 첨부
      # 채널 정보
      - channels:read             # 공개 채널 정보
      - groups:read               # 비공개 채널 정보
      - im:history                # DM 기록 (선택)
      - im:write                  # DM 보내기
      # 사용자 식별
      - users:read                # 누가 요청했는지

settings:
  event_subscriptions:
    # 배포 후 실제 URL로 교체:
    # request_url: https://YOUR-CLOUDRUN-URL.run.app/slack/events
    bot_events:
      - app_mention             # @ZeroDeck 멘션
      - file_shared             # 채널에 파일 업로드 시
      - message.im              # DM 받기 (선택)

  interactivity:
    is_enabled: true
    # 배포 후 실제 URL로 교체:
    # request_url: https://YOUR-CLOUDRUN-URL.run.app/slack/events

  org_deploy_enabled: false
  socket_mode_enabled: false   # Cloud Run에 배포할 거라 false. 로컬 개발 때만 true
  token_rotation_enabled: false
